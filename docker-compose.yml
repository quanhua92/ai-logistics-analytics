services:
  postgres:
    image: postgres:18-alpine
    container_name: ai-logistics-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD: logistics
      POSTGRES_DB: logistics
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "log_min_duration_statement=500ms"
      - "-c"
      - "statement_timeout=30s"
    ports:
      - "127.0.0.1:15443:5432"
    volumes:
      - ai_logistics_analytics_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d logistics"]
      interval: 5s
      timeout: 5s
      retries: 10
    shm_size: 256mb
    mem_limit: 2g
    mem_swappiness: 0
    pids_limit: 200

  server:
    build: ./server
    container_name: ai-logistics-analytics-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://logistics:logistics@postgres:5432/logistics
      CHAT_LOG_DIR: /data/chat-logs
    command: >
      sh -c ".venv/bin/alembic upgrade head;
             .venv/bin/python data/seed.py || true;
             .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    ports:
      - "8000:8000"
    volumes:
      - chat_logs:/data/chat-logs
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./web
    container_name: ai-logistics-analytics-web
    restart: unless-stopped
    environment:
      BACKEND_URL: http://server:8000
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  ai_logistics_analytics_pgdata:
    name: ai_logistics_analytics_pgdata
  chat_logs:
    name: ai_logistics_analytics_chat_logs
