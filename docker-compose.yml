services:
  postgres:
    image: postgres:18-alpine
    container_name: ai-logistics-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logistics
      POSTGRES_PASSWORD: logistics
      POSTGRES_DB: logistics
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "log_min_duration_statement=500ms"
      - "-c"
      - "statement_timeout=30s"
    ports:
      - "127.0.0.1:15443:5432"
    volumes:
      - ai_logistics_analytics_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics -d logistics"]
      interval: 5s
      timeout: 5s
      retries: 10
    shm_size: 256mb
    mem_limit: 2g
    mem_swappiness: 0
    pids_limit: 200

volumes:
  ai_logistics_analytics_pgdata:
    name: ai_logistics_analytics_pgdata
